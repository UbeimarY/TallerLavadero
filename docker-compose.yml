version: '3.8'

services:

  # ── Base de datos PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lavado_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lavadodb
      POSTGRES_USER: lavado
      POSTGRES_PASSWORD: lavado123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # datos persistentes
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql  # script inicial
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lavado -d lavadodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (interfaz web para gestionar la BD) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lavado_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lavado.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: lavado_postgres_data   # volumen nombrado → persiste entre reinicios
  pgadmin_data:
    name: lavado_pgadmin_data
